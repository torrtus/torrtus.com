<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#da66a7"/>
      <stop offset="100%" stop-color="#482d61"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <!-- Glowing planet -->
  <circle cx="14" cy="14" r="13" fill="url(#glow)" filter="url(#blur)"/>
  <!-- Dark overlay circle creating eclipse effect -->
  <circle cx="20" cy="20" r="13" fill="#09030b"/>
</svg>
